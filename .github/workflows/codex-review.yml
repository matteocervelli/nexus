name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  codex-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not configured — skipping Codex review"
            exit 0
          fi

          git diff "origin/$BASE_REF"...HEAD | head -c 8000 > /tmp/pr_diff.txt

          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          api_key = os.environ["OPENAI_API_KEY"]
          gh_token = os.environ["GH_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          with open("/tmp/pr_diff.txt") as f:
              diff = f.read()

          prompt = (
              "Review this pull request diff concisely. Flag bugs, security issues, or "
              "significant design problems. Skip trivial style nitpicks.\n\n"
              f"```diff\n{diff}\n```"
          )

          url = "https://api.openai.com/v1/chat/completions"
          body = json.dumps({
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": "You are a senior software engineer doing a PR code review."},
                  {"role": "user", "content": prompt},
              ],
              "max_tokens": 1024,
          }).encode()
          req = urllib.request.Request(
              url,
              data=body,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.load(resp)
                  review = data["choices"][0]["message"]["content"]
          except Exception as e:
              print(f"OpenAI API error: {e}", file=sys.stderr)
              sys.exit(1)

          comment_body = f"## Codex Code Review\n\n{review}\n\n---\n*Automated review by OpenAI GPT-4o*"
          comment_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          req2 = urllib.request.Request(
              comment_url,
              data=json.dumps({"body": comment_body}).encode(),
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(req2) as resp2:
              cid = json.load(resp2)["id"]
              print(f"Posted Codex review comment: {cid}")
          PYEOF
