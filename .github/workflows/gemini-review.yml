name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  gemini-review:
    name: Gemini Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not configured — skipping Gemini review"
            exit 0
          fi

          git diff "origin/$BASE_REF"...HEAD | head -c 8000 > /tmp/pr_diff.txt

          python3 << 'PYEOF'
          import os, json, urllib.request, sys

          api_key = os.environ["GEMINI_API_KEY"]
          gh_token = os.environ["GH_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          with open("/tmp/pr_diff.txt") as f:
              diff = f.read()

          prompt = (
              "Review this pull request diff concisely. Flag bugs, security issues, or "
              "significant design problems. Skip trivial style nitpicks.\n\n"
              f"```diff\n{diff}\n```"
          )

          url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              f"gemini-2.0-flash:generateContent?key={api_key}"
          )
          body = json.dumps({"contents": [{"parts": [{"text": prompt}]}]}).encode()
          req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.load(resp)
                  review = data["candidates"][0]["content"]["parts"][0]["text"]
          except Exception as e:
              print(f"Gemini API error: {e}", file=sys.stderr)
              sys.exit(1)

          comment_body = f"## Gemini Code Review\n\n{review}\n\n---\n*Automated review by Gemini 2.0 Flash*"
          comment_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
          req2 = urllib.request.Request(
              comment_url,
              data=json.dumps({"body": comment_body}).encode(),
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(req2) as resp2:
              cid = json.load(resp2)["id"]
              print(f"Posted Gemini review comment: {cid}")
          PYEOF
